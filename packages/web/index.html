<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share2Brain</title>
    <!-- FOUC-free theme init (Story 2.2, AC6): runs synchronously before the stylesheet
         <link>s below, so the persisted theme is applied to <html data-kh> before the
         first paint — no flash of the wrong theme on reload. useTheme reads this back.
         Falls back to the OS preference when nothing is stored (Story 2.1 deferred item),
         else dark. Wrapped in try/catch because private-mode Safari throws on localStorage. -->
    <script>
      try {
        var t = localStorage.getItem('share2brain-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-kh', t);
      } catch (e) {
        document.documentElement.setAttribute('data-kh', 'dark');
      }
    </script>
    <!-- Design-system fonts (Story 2.1): Space Grotesk (titles/brand), IBM Plex Sans
         (body/UI), IBM Plex Mono (metadata). Single non-render-blocking request via
         <link> + display=swap; preconnect warms the font hosts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- React mounts here (see src/main.tsx). The full SPA arrives in Epic 2. -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
