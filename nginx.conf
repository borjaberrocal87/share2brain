# Hivly nginx config — fully replaces the default (mounted/baked at
# /etc/nginx/nginx.conf). nginx is the ONLY host-exposed service (AD-7); it
# fronts the backend API and serves the static SPA. backend listens only on the
# internal Docker network and never serves SPA files.
events {}

http {
  # Serve JS/CSS with correct MIME types (the SPA won't load otherwise).
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # backend is reachable as http://backend:3000 on the Compose network.
  server {
    listen 80;

    # Health check, reachable through the single exposed port. GET /health is
    # top-level and auth-exempt — do NOT rename to /api/health.
    location = /health {
      proxy_pass http://backend:3000/health;
    }

    # Chat streams via SSE (AD-4). Buffering/caching MUST be off or tokens are
    # withheld until the response ends; long read timeout for open streams
    # (AD-7). Longest-prefix match means this wins over /api/ for /api/chat.
    location /api/chat {
      proxy_pass http://backend:3000;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_set_header Connection '';
      proxy_http_version 1.1;
    }

    # Everything else under /api/ proxies to the backend.
    location /api/ {
      proxy_pass http://backend:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Static SPA: serve built files, falling back to index.html for client-side
    # routing (AD-3).
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }
  }
}
