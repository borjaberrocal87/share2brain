name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape Share2Brain! Check the [ROADMAP](https://github.com/borjaberrocal87/share2brain/blob/main/ROADMAP.md)
        first — your idea might already be planned (or listed as a non-goal).
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point from a user's or operator's perspective.
      placeholder: As a community admin, I can't ... which means ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? Rough ideas are fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or how you work around it today.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked the ROADMAP and existing issues for something similar
          required: true
        - label: If this touches an architecture invariant (see CONTRIBUTING.md), I understand it needs design discussion before code
