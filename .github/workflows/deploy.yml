# Share2Brain — Continuous Deploy to Hostinger VPS
#
# Two-stage pipeline matching the share2brain-landing pattern:
#   1. build-and-push — builds all 5 Docker images with Buildx + GHA cache,
#      pushes to GHCR (latest + sha-xxx tags).
#   2. deploy — SCPs the production compose to the VPS, pulls the pre-built
#      images, and restarts the stack.
#
# The VPS never builds anything — it only pulls. Saves RAM and deploy time.
#
# Required GitHub Secrets:
#   HOSTINGER_HOST     — public IP of the VPS
#   HOSTINGER_USER     — SSH user (root or deploy)
#   HOSTINGER_SSH_KEY  — full private key (ed25519 recommended)
#
# See docs/hostinger-deploy.md for the full setup guide.

name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/share2brain

jobs:
  # ── Stage 1: build + push all images ───────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            file: packages/backend/Dockerfile
          - name: bot
            file: packages/bot/Dockerfile
          - name: workers
            file: packages/workers/Dockerfile
          - name: nginx
            file: packages/web/Dockerfile
          - name: migrator
            file: Dockerfile.migrator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  # ── Stage 2: deploy to VPS ─────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: /opt/share2brain

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail

            cd /opt/share2brain

            echo "=== Logging in to GHCR ==="
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            echo "=== Pulling pre-built images ==="
            docker compose -f docker-compose.prod.yml pull

            echo "=== Deploying services ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Waiting for services to stabilize ==="
            sleep 15

            echo "=== Service status ==="
            docker compose -f docker-compose.prod.yml ps

            echo "=== Health check ==="
            if curl -sf --max-time 5 http://127.0.0.1:8080/health > /dev/null 2>&1; then
              echo "✓ Health check passed"
            else
              echo "⚠ Health check not ready yet — services may still be starting"
              docker compose -f docker-compose.prod.yml logs --tail=20 backend
            fi

            echo "=== Pruning old images ==="
            docker image prune -f

            echo "=== Deploy complete ==="
