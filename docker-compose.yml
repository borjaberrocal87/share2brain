# Share2Brain — full stack (AC1: exactly 7 services).
#   postgres, redis ─→ migrator (one-shot) ─→ bot, workers, backend ─→ nginx
#
# Secrets come from .env (env_file); in-container hostnames override the
# localhost URLs via `environment:` (containers reach postgres/redis by service
# name, never localhost). Behavior config is mounted read-only at
# /app/Share2Brain.config.yml. Images are pinned — never :latest.

services:
  # ── Data stores ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: share2brain
      POSTGRES_USER: share2brain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Dev-only host exposure, bound to loopback. nginx is the only public port.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U share2brain -d share2brain"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── One-shot migrator (AD-9) ─────────────────────────────────────────────────
  migrator:
    build:
      context: .
      dockerfile: Dockerfile.migrator
    command: npx drizzle-kit migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://share2brain:${POSTGRES_PASSWORD}@postgres:5432/share2brain
    depends_on:
      postgres:
        condition: service_healthy
    # Never restart — it applies migrations once and exits 0.
    restart: "no"

  # ── Application services ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://share2brain:${POSTGRES_PASSWORD}@postgres:5432/share2brain
      REDIS_URL: redis://redis:6379
      # LLM (RAG, Epic 5) + embeddings (search query, Epic 4). base_url only for "custom".
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-}
    volumes:
      - ./Share2Brain.config.yml:/app/Share2Brain.config.yml:ro
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Story 6.4 (AC-3, note #7): the bounded graceful-drain (server close 10s +
    # redis.quit 5s + db.end 10s) can total ~25s worst case — longer than
    # Compose's 10s default, which would SIGKILL mid-drain.
    stop_grace_period: 30s

  bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://share2brain:${POSTGRES_PASSWORD}@postgres:5432/share2brain
      REDIS_URL: redis://redis:6379
    volumes:
      - ./Share2Brain.config.yml:/app/Share2Brain.config.yml:ro
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Story 6.4 (AC-3, note #7): the bounded drain (backfill/offline-sync wait 5s
    # + Gateway destroy 5s + redis.quit 5s + db.end 10s) can total ~25s worst case.
    stop_grace_period: 30s

  workers:
    build:
      context: .
      dockerfile: packages/workers/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://share2brain:${POSTGRES_PASSWORD}@postgres:5432/share2brain
      REDIS_URL: redis://redis:6379
      # Embeddings (Indexer, Story 3.3). base_url only for "custom".
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-}
      # Enrichment LLM (Indexer, Epic 7 — title/description generation, Story 7.2). base_url only for "custom".
      ENRICHMENT_LLM_API_KEY: ${ENRICHMENT_LLM_API_KEY}
      ENRICHMENT_LLM_BASE_URL: ${ENRICHMENT_LLM_BASE_URL:-}
    volumes:
      - ./Share2Brain.config.yml:/app/Share2Brain.config.yml:ro
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Story 6.4 (AC-3, note #7): the bounded drain is sequential — consumer loops
    # 7s + up to 3 bounded redis.quit calls (redis + syncRedisUpdated +
    # syncRedisDeleted) at 5s each + db.end 10s = 32s worst case (sync enabled).
    # Grace must exceed that or Compose SIGKILLs mid db.end() → 35s (not 30s like
    # backend/bot, which top out at 25s with a single redis client).
    stop_grace_period: 35s

  # ── Edge: the only host-exposed service (AD-7) ──────────────────────────────
  # Built from packages/web/Dockerfile: the SPA dist + nginx.conf are baked into
  # nginx:1.27-alpine, so no separate web service or shared volume is needed.
  nginx:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  pgdata:
